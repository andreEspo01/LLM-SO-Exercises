rules:

  - id: no_free_parameters
    languages: [c]
    severity: ERROR 
    message: "È richiesto che la struttura dati con i parametri del thread worker venga deallocata dallo heap, utilizzando free()."
    patterns:
      - pattern: |
          int main(...){
            ...
          }

          $VOID worker(...){
            ...
          }

      - pattern-not: |
          int main(...){
            ...
          }
          $VOID worker(...){
            ...
            free(...);
            ...
          }

      - pattern-not: |
          int main(...){
            ...
            for(int i=0; i<TOTALE_WORKER; i++) {
                ...
                $P = malloc(...);
                ...
            }
            ...
            for(int i=0; i<TOTALE_WORKER; i++) {
                ...
                pthread_join(...);
                ...
                free(...);
                ...
            }
            ...
          }  
          $VOID worker(...){
            ...
          }
